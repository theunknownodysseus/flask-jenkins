<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ecommerce Page</title>

  <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="m-3" style="font-family: 'Kumbh Sans', sans-serif;">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">

    <a class="navbar-brand">
      <img src="{{ url_for('static', filename='logo.svg') }}" />
    </a>

    <ul class="navbar-nav ms-auto d-flex align-items-center">

      <li class="nav-item me-3">
        <a id="cart-btn">
          <img src="{{ url_for('static', filename='icon-cart.svg') }}" />
          <span id="badge" class="badge rounded-pill" style="background:#FF7E1B;"></span>
        </a>
      </li>

      <li class="nav-item">
        <img src="{{ url_for('static', filename='image-avatar.png') }}" style="max-width:50px;" />
      </li>

    </ul>
  </div>
</nav>

<!-- MAIN -->
<div class="container-fluid mt-4">
  <div class="row">

    <!-- IMAGE CAROUSEL -->
    <div class="col-md">
      <img id="main-image" src="{{ url_for('static', filename='image-product-1.jpg') }}" class="img-fluid rounded-3">
      
      <div class="d-flex mt-3 gap-2">
        <img class="thumb img-fluid" src="{{ url_for('static', filename='image-product-1-thumbnail.jpg') }}">
        <img class="thumb img-fluid" src="{{ url_for('static', filename='image-product-2-thumbnail.jpg') }}">
        <img class="thumb img-fluid" src="{{ url_for('static', filename='image-product-3-thumbnail.jpg') }}">
        <img class="thumb img-fluid" src="{{ url_for('static', filename='image-product-4-thumbnail.jpg') }}">
      </div>
    </div>

    <!-- CONTENT -->
    <div class="col">

      <p style="color:#FF7E1B;">SNEAKER COMPANY</p>
      <h1>Fall Limited Edition Sneakers</h1>

      <p>
        These low-profile sneakers are your perfect casual wear companion.
      </p>

      <h3>$125.00</h3>

      <!-- COUNTER -->
      <div class="d-flex gap-3 align-items-center mt-3">
        <div class="p-2" style="background:#F6F8FD;">
          <span id="minus-btn" style="cursor:pointer;">-</span>
          <span id="counter-display">0</span>
          <span id="plus-btn" style="cursor:pointer;">+</span>
        </div>

        <button id="add-to-cart-btn" class="btn text-white" style="background:#FF7E1B;">
          Add to Cart
        </button>
      </div>

      <!-- CART MODAL -->
      <div id="cart-box" class="mt-3"></div>

    </div>

  </div>
</div>

<!-- JS -->
<script>

const minusBtn = document.getElementById("minus-btn");
const plusBtn = document.getElementById("plus-btn");
const counterDisplay = document.getElementById("counter-display");

minusBtn.onclick = () => {
  let val = parseInt(counterDisplay.textContent);
  if(val > 0) counterDisplay.textContent = val - 1;
};

plusBtn.onclick = () => {
  let val = parseInt(counterDisplay.textContent);
  counterDisplay.textContent = val + 1;
};

const addToCartBtn = document.getElementById("add-to-cart-btn");
const badge = document.getElementById("badge");
const cartBox = document.getElementById("cart-box");

addToCartBtn.onclick = () => {
  let quantity = parseInt(counterDisplay.textContent);

  if(quantity > 0){
    badge.textContent = quantity;

    cartBox.innerHTML = `
      <img src="/static/image-product-1-thumbnail.jpg" width="50">
      <p>Fall Limited Edition Sneakers</p>
      <p>$125 x ${quantity} = <b>$${125 * quantity}</b></p>
      <button id="delete-btn">Remove</button>
    `;

    document.getElementById("delete-btn").onclick = () => {
      cartBox.innerHTML = "Cart is empty";
      badge.textContent = "";
    };
  }
};

</script>

</body>
</html>
